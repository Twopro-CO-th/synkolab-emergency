# ============================================================
# synkolab-emergency — Production with SSL (Nginx)
# ============================================================
# Usage:
#   1. วาง SSL cert ใน ./certs/fullchain.pem, ./certs/privkey.pem (Sectigo Wildcard *.stu-link.com)
#   2. cp .env.example .env && แก้ค่า production
#   3. docker compose -f docker-compose.prod.yml up -d
#
# หรือใช้ Let's Encrypt:
#   docker compose -f docker-compose.prod.yml run --rm certbot
# ============================================================

services:
  # --- Emergency API ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emergency-api
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/emergency.db
      - SSL_ENABLED=true
      - SSL_CERT_PATH=/app/certs/fullchain.pem
      - SSL_KEY_PATH=/app/certs/privkey.pem
    volumes:
      - app-data:/app/data
      - ./certs/fullchain.pem:/app/certs/fullchain.pem:ro
      - ./certs/privkey.pem:/app/certs/privkey.pem:ro
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://localhost:4000/health", "--no-check-certificate"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - emergency-net

  # --- Nginx (SSL Termination + Reverse Proxy) ---
  nginx:
    image: nginx:alpine
    container_name: emergency-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - emergency-net

  # --- Let's Encrypt Certbot (optional) ---
  certbot:
    image: certbot/certbot
    container_name: emergency-certbot
    volumes:
      - ./certs:/etc/letsencrypt:rw
      - certbot-www:/var/www/certbot:rw
    entrypoint: /bin/sh -c
    command: >
      "certbot certonly --webroot
       --webroot-path=/var/www/certbot
       --email admin@cmru.ac.th
       --agree-tos --no-eff-email
       -d call.stu-link.com
       && cp /etc/letsencrypt/live/call.stu-link.com/fullchain.pem /etc/letsencrypt/fullchain.pem
       && cp /etc/letsencrypt/live/call.stu-link.com/privkey.pem /etc/letsencrypt/privkey.pem"
    profiles:
      - certbot

  # --- TURN Server ---
  coturn:
    image: coturn/coturn:latest
    container_name: emergency-coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/turnserver.conf:/etc/turnserver.conf:ro
      - ./certs/fullchain.pem:/etc/coturn/certs/fullchain.pem:ro
      - ./certs/privkey.pem:/etc/coturn/certs/privkey.pem:ro
    command: ["-c", "/etc/turnserver.conf"]

volumes:
  app-data:
    driver: local
  certbot-www:
    driver: local

networks:
  emergency-net:
    driver: bridge
