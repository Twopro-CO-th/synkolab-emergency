# ============================================================
# coturn TURN server config for synkolab-emergency
# ============================================================

# Listening ports
listening-port=3478
tls-listening-port=5349

# SSL/TLS certificates
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# Authentication
use-auth-secret
static-auth-secret=commlink-turn-secret-2026

# Domain
realm=call.stu-link.com

# Network
# แก้ external-ip เป็น IP จริงของ server
# format: external-ip=PUBLIC_IP/PRIVATE_IP
external-ip=202.29.60.24

# Logging
log-file=/var/log/turnserver.log
simple-log
no-stdout-log

# Security
no-multicast-peers
no-cli
fingerprint
no-tlsv1
no-tlsv1_1

# Performance
total-quota=100
max-bps=0
stale-nonce=600
