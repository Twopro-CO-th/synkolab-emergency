# ============================================================
# LiveKit Server Config for synkolab-emergency
# ============================================================

port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50060
  use_external_ip: false
  node_ip: 127.0.0.1
  enable_loopback_candidate: true

redis:
  address: redis:6379

keys:
  devkey: secret123456789abcdef123456789abcdef

logging:
  level: info

room:
  empty_timeout: 300
  max_participants: 50

turn:
  enabled: true
  udp_port: 3478
  tls_port: 0
  relay_range_start: 50100
  relay_range_end: 50160
