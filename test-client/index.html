<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency API — Test Client</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 18px; color: #f8fafc; }
    .header .status { font-size: 13px; padding: 4px 10px; border-radius: 12px; }
    .status.online { background: #065f46; color: #6ee7b7; }
    .status.offline { background: #7f1d1d; color: #fca5a5; }

    .layout { display: grid; grid-template-columns: 260px 1fr 360px; height: calc(100vh - 57px); }

    /* Sidebar */
    .sidebar { background: #1e293b; border-right: 1px solid #334155; overflow-y: auto; }
    .sidebar h3 { padding: 12px 16px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; }
    .sidebar button {
      display: block; width: 100%; text-align: left; padding: 10px 16px; background: none; border: none;
      color: #cbd5e1; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s;
    }
    .sidebar button:hover { background: #334155; color: #f8fafc; }
    .sidebar button.active { background: #334155; border-left-color: #3b82f6; color: #60a5fa; }
    .sidebar button.sos { color: #f87171; }
    .sidebar button.sos:hover { background: #450a0a; }

    /* Main area */
    .main { padding: 24px; overflow-y: auto; }
    .panel { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .panel h2 { font-size: 16px; margin-bottom: 12px; color: #f8fafc; }
    .panel p.desc { font-size: 13px; color: #94a3b8; margin-bottom: 16px; }

    .form-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .form-row label { font-size: 12px; color: #94a3b8; min-width: 90px; }
    .form-row input, .form-row select {
      flex: 1; padding: 8px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px;
      color: #e2e8f0; font-size: 13px; outline: none;
    }
    .form-row input:focus, .form-row select:focus { border-color: #3b82f6; }

    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer;
      font-weight: 500; transition: all .15s;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-success:hover { background: #16a34a; }
    .btn-warn { background: #f59e0b; color: #000; }
    .btn-warn:hover { background: #d97706; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-group { display: flex; gap: 8px; margin-top: 12px; }

    /* Log panel */
    .log-panel { background: #1e293b; border-left: 1px solid #334155; display: flex; flex-direction: column; }
    .log-panel h3 { padding: 12px 16px; font-size: 13px; color: #94a3b8; border-bottom: 1px solid #334155; }
    #log {
      flex: 1; overflow-y: auto; padding: 8px; font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px; line-height: 1.6;
    }
    .log-entry { padding: 2px 8px; border-radius: 3px; }
    .log-entry.send { color: #60a5fa; }
    .log-entry.recv { color: #34d399; }
    .log-entry.err { color: #f87171; }
    .log-entry.info { color: #a78bfa; }
    .log-entry.sys { color: #fbbf24; }
    .log-entry .time { color: #64748b; margin-right: 6px; }

    .clear-log { padding: 8px; border-top: 1px solid #334155; text-align: center; }

    /* Call UI */
    .call-active { background: #064e3b; border-color: #065f46; }
    .call-ringing { background: #451a03; border-color: #78350f; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .7; } }

    .audio-meter { height: 6px; background: #334155; border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .audio-meter-fill { height: 100%; background: #22c55e; border-radius: 3px; transition: width .1s; width: 0%; }

    /* Call history table */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; padding: 8px; color: #64748b; border-bottom: 1px solid #334155; font-weight: 500; }
    td { padding: 8px; border-bottom: 1px solid #1e293b; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    .badge-emergency { background: #7f1d1d; color: #fca5a5; }
    .badge-normal { background: #1e3a5f; color: #93c5fd; }
    .badge-broadcast { background: #3f3f00; color: #fde047; }
    .badge-active { background: #065f46; color: #6ee7b7; }
    .badge-ringing { background: #78350f; color: #fbbf24; }
    .badge-completed { background: #334155; color: #94a3b8; }
    .badge-missed { background: #7f1d1d; color: #fca5a5; }

    /* Device cards */
    .device-card { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
    .device-card .name { font-weight: 600; }
    .device-card .meta { font-size: 11px; color: #64748b; margin-top: 4px; }

    #incoming-popup {
      display: none; position: fixed; top: 20px; right: 20px; z-index: 100;
      background: #1e293b; border: 2px solid #f59e0b; border-radius: 12px; padding: 20px;
      min-width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    #incoming-popup.show { display: block; animation: slideIn .3s; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: none; opacity: 1; } }

    /* Active call bar — fixed bottom */
    #call-bar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
      background: #065f46; border-top: 2px solid #10b981; padding: 10px 24px;
      justify-content: space-between; align-items: center; gap: 16px;
    }
    #call-bar.active { display: flex; }
    #call-bar.broadcast { background: #78350f; border-top-color: #f59e0b; }
    #call-bar.emergency { background: #7f1d1d; border-top-color: #ef4444; }
    #call-bar .call-info { font-size: 13px; flex: 1; }
    #call-bar .call-info .label { font-size: 11px; color: rgba(255,255,255,.6); }
    #call-bar .call-meter { width: 120px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚨 Emergency API Test Client</h1>
    <span id="ws-status" class="status offline">Disconnected</span>
    <span id="online-count" style="font-size:13px;color:#64748b"></span>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <h3>Connection</h3>
      <button data-panel="connect" class="active">🔌 Connect / Auth</button>

      <h3>Calls</h3>
      <button data-panel="call-normal">📞 Normal Call</button>
      <button data-panel="call-emergency" class="sos">🚨 Emergency SOS</button>
      <button data-panel="call-broadcast">📢 Broadcast</button>
      <button data-panel="call-history">📋 Call History</button>

      <h3>Devices</h3>
      <button data-panel="device-register">➕ Register Device</button>
      <button data-panel="device-list">📱 Device List</button>

      <h3>LiveKit</h3>
      <button data-panel="lk-config">⚙️ Config</button>
      <button data-panel="lk-token">🎫 Get Token</button>
      <button data-panel="lk-rooms">🏠 Rooms</button>
      <button data-panel="lk-audio">🎤 Audio Test</button>

      <h3>Utilities</h3>
      <button data-panel="turn">🔄 TURN Credentials</button>
      <button data-panel="health">💚 Health Check</button>
      <button data-panel="ws-signal">📡 WebRTC Signal</button>
    </div>

    <!-- Main -->
    <div class="main" id="main"></div>

    <!-- Log -->
    <div class="log-panel">
      <h3>📋 Event Log</h3>
      <div id="log"></div>
      <div class="clear-log">
        <button class="btn btn-sm btn-warn" onclick="document.getElementById('log').innerHTML=''">Clear Log</button>
      </div>
    </div>
  </div>

  <!-- Incoming call popup -->
  <div id="incoming-popup">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">📞 Incoming Call</div>
    <div id="incoming-info" style="font-size:13px;color:#94a3b8;margin-bottom:16px"></div>
    <div class="btn-group">
      <button class="btn btn-success" id="btn-accept">✅ Accept</button>
      <button class="btn btn-danger" id="btn-reject">❌ Reject</button>
    </div>
  </div>

  <!-- Active call bar (bottom) — visible during any active call/broadcast -->
  <div id="call-bar">
    <div class="call-info">
      <div class="label" id="call-bar-label">ACTIVE CALL</div>
      <div id="call-bar-info">—</div>
    </div>
    <div class="call-meter">
      <div style="font-size:10px;color:rgba(255,255,255,.5)">Audio</div>
      <div class="audio-meter"><div class="audio-meter-fill" id="call-bar-meter"></div></div>
    </div>
    <button class="btn btn-danger btn-sm" id="btn-call-bar-end">📴 End</button>
  </div>

  <!-- Hidden audio playback container for remote tracks -->
  <div id="remote-audio-container" style="display:none"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
