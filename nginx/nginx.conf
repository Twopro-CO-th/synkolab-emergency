# ============================================================
# Nginx reverse proxy for synkolab-emergency
# SSL termination + WebSocket upgrade
# ============================================================

upstream emergency_api {
    server app:4000;
    keepalive 32;
}

# --- Redirect HTTP → HTTPS ---
server {
    listen 80;
    server_name emergency.comm-link.cmru.ac.th;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server ---
server {
    listen 443 ssl http2;
    server_name emergency.comm-link.cmru.ac.th;

    # --- SSL certificates ---
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # --- SSL hardening ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- HSTS ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Logging ---
    access_log /var/log/nginx/emergency_access.log;
    error_log  /var/log/nginx/emergency_error.log;

    # --- WebSocket signaling ---
    location /ws {
        proxy_pass http://emergency_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # No buffering for WebSocket
        proxy_buffering off;
    }

    # --- API routes ---
    location / {
        proxy_pass http://emergency_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Buffer settings
        proxy_buffer_size 8k;
        proxy_buffers 4 8k;
    }

    # --- Health check (no auth) ---
    location = /health {
        proxy_pass http://emergency_api;
        access_log off;
    }
}
