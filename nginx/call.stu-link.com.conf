# ============================================================
# Host Nginx config for call.stu-link.com
# คัดลอกไฟล์นี้ไป /etc/nginx/sites-enabled/
#   sudo cp nginx/call.stu-link.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name call.stu-link.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name call.stu-link.com;

    # --- SSL (ใช้ cert เดียวกับ subdomain อื่น) ---
    ssl_certificate     /home/superadmin/ssl3/fullchain.pem;
    ssl_certificate_key /home/superadmin/ssl3/stu_link.com.key;
    ssl_trusted_certificate /home/superadmin/ssl3/fullchain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- WebSocket signaling ---
    location /ws {
        proxy_pass https://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_ssl_verify off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # --- API routes ---
    location / {
        proxy_pass https://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_ssl_verify off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- LiveKit API (Room Service) ---
    location /twirp/ {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- LiveKit WebSocket ---
    location /rtc {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # --- Health check ---
    location = /health {
        proxy_pass https://127.0.0.1:4000;
        proxy_ssl_verify off;
        access_log off;
    }

    error_log /var/log/nginx/call_error.log;
    access_log /var/log/nginx/call_access.log;
}
